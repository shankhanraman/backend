
<div style="padding:1rem 0">
<style>
#erd3 svg { width:100%; }
#erd3 svg.erDiagram .divider path { stroke-opacity:0.4; }
#erd3 svg.erDiagram .row-rect-odd path,
#erd3 svg.erDiagram .row-rect-odd rect,
#erd3 svg.erDiagram .row-rect-even path,
#erd3 svg.erDiagram .row-rect-even rect { stroke:none !important; }
</style>
<div id="erd3"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor:        dark ? '#9c9a92' : '#73726c',
    textColor:        dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor:     dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    secondaryColor:   dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#0F6E56',
    secondaryBorderColor: dark ? '#1D9E75' : '#1D9E75',
    tertiaryColor:    dark ? '#633806' : '#FAEEDA',
    tertiaryTextColor: dark ? '#FAC775' : '#633806',
    tertiaryBorderColor: dark ? '#BA7517' : '#BA7517',
    background:       dark ? '#2C2C2A' : '#ffffff',
    nodeBorder:       dark ? '#534AB7' : '#534AB7',
  },
});

const diagram = `erDiagram

  CATEGORY {
    string name
  }

  MENU_ITEM {
    string name
    string size_variant
  }

  ITEM_INGREDIENT {
    number quantity
    string unit
  }

  INGREDIENT {
    string name
    string unit
  }

  INVENTORY_STOCK {
    number qty_on_hand
    number reorder_threshold
    date last_updated
  }

  STOCK_TRANSACTION {
    string type
    number quantity
    string triggered_by
    date created_at
  }

  SUPPLIER {
    string name
    string contact
  }

  CUSTOMER {
    string name
    string contact
  }

  ORDER {
    string status
    date created_at
  }

  ORDER_LINE {
    string size_variant
    int quantity
  }

  KOT {
    string status
    date issued_at
  }

  BILL {
    number total_amount
    string payment_status
    date billed_at
  }

  STAFF {
    string name
    string role
  }

  CATEGORY ||--o{ MENU_ITEM : "groups"
  MENU_ITEM ||--o{ ITEM_INGREDIENT : "has"
  INGREDIENT ||--o{ ITEM_INGREDIENT : "used in"
  INGREDIENT ||--|| INVENTORY_STOCK : "tracked as"
  INVENTORY_STOCK ||--o{ STOCK_TRANSACTION : "records"
  SUPPLIER ||--o{ STOCK_TRANSACTION : "supplies via"
  CUSTOMER ||--o{ ORDER : "places"
  ORDER ||--o{ ORDER_LINE : "contains"
  ORDER_LINE }o--|| MENU_ITEM : "references"
  ORDER ||--|| KOT : "generates"
  ORDER ||--|| BILL : "produces"
  STAFF ||--o{ ORDER : "handles"
  STAFF ||--o{ KOT : "fulfils"
`;

const { svg } = await mermaid.render('erd3-svg', diagram);
document.getElementById('erd3').innerHTML = svg;

document.querySelectorAll('#erd3 svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]];
  const ys = [nums[1],nums[3],nums[5],nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs)-x, h = Math.max(...ys)-y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd3 svg.erDiagram .row-rect-odd path, #erd3 svg.erDiagram .row-rect-even path')
  .forEach(p => p.setAttribute('stroke','none'));
</script>

<div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--color-text-secondary)">
  <span style="display:flex;align-items:center;gap:6px">
    <span style="display:inline-block;width:28px;height:2px;background:#534AB7"></span> Menu &amp; Inventory domain
  </span>
  <span style="display:flex;align-items:center;gap:6px">
    <span style="display:inline-block;width:28px;height:2px;background:#1D9E75"></span> Order &amp; Workflow domain
  </span>
  <span style="display:flex;align-items:center;gap:6px">
    <span style="display:inline-block;width:28px;height:2px;background:#BA7517"></span> Junction entity
  </span>
  <span style="color:var(--color-text-tertiary)">||—o{ = one to many &nbsp;·&nbsp; ||—|| = one to one &nbsp;·&nbsp; }o—|| = many to one</span>
</div>
</div>
