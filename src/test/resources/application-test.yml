spring:
  datasource:
    url: jdbc:h2:mem:arogya;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

app:
  seed:
    enabled: false
  security:
    jwt:
      secret: test-only-secret-key-please-rotate-needs-32-bytes-min
      expiration-minutes: 60
