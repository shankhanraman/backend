# Datasource is provided at runtime by the Testcontainers PostgreSQL container via
# @ServiceConnection (see AbstractIntegrationTest) — no JDBC URL/credentials here, and no H2.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  seed:
    enabled: false
  security:
    jwt:
      secret: test-only-secret-key-please-rotate-needs-32-bytes-min
      expiration-minutes: 60
