services:
  postgres:
    image: postgres:16-alpine
    container_name: arogya-cafe-postgres
    environment:
      POSTGRES_DB: arogya_cafe
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe
    # High host port to avoid clashing with native PostgreSQL installs (5432/5433).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - arogya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  arogya_pgdata:
